_format_version: '3.0'

upstreams:
  - name: catalog-service.upstream
    targets:
      - target: catalog-service:3001
        weight: 100
    sticky_sessions_cookie_path: /
    # 全 upstream 共通のヘルスチェック設定。以降の upstream は *upstream_healthchecks で参照する。
    healthchecks: &upstream_healthchecks
      active:
        type: http
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
      passive:
        type: http
        healthy:
          successes: 2
        unhealthy:
          http_failures: 3
          tcp_failures: 1

  - name: cart-service.upstream
    targets:
      - target: cart-service:3002
        weight: 100
    sticky_sessions_cookie_path: /
    healthchecks: *upstream_healthchecks

  - name: order-service.upstream
    targets:
      - target: order-service:3003
        weight: 100
    sticky_sessions_cookie_path: /
    healthchecks: *upstream_healthchecks

  - name: shipping-service.upstream
    targets:
      - target: shipping-service:3004
        weight: 100
    sticky_sessions_cookie_path: /
    healthchecks: *upstream_healthchecks

  - name: user-service.upstream
    targets:
      - target: user-service:3005
        weight: 100
    sticky_sessions_cookie_path: /
    healthchecks: *upstream_healthchecks

  - name: agent-service.upstream
    targets:
      - target: agent-service:3006
        weight: 100
    sticky_sessions_cookie_path: /
    healthchecks: *upstream_healthchecks

services:
  - name: catalog-service
    host: catalog-service.upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: catalog-route
        paths:
          - /api/products
        protocols:
          - http
          - https
        strip_path: false
  - name: cart-service
    host: cart-service.upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: cart-route
        paths:
          - /api/carts
        protocols:
          - http
          - https
        strip_path: false
  - name: order-service
    host: order-service.upstream
    protocol: http
    retries: 0 # POST による注文作成の重複を防ぐためリトライ無効
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: order-route
        paths:
          - /api/orders
        protocols:
          - http
          - https
        strip_path: false
  - name: shipping-service
    host: shipping-service.upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: shipping-route
        paths:
          - /api/shipments
        protocols:
          - http
          - https
        strip_path: false
  - name: user-service
    host: user-service.upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: user-route
        paths:
          - /api/users
        protocols:
          - http
          - https
        strip_path: false
  - name: agent-service
    host: agent-service.upstream
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: agent-route
        paths:
          - /api/agent
        protocols:
          - http
          - https
        strip_path: false

  # ============================================================
  # /admin — curl / API クライアント向けの API キー認証経路
  # ブラウザ経路（/api/...）は OIDC のまま。curl は JWT を取得せず apikey ヘッダーで叩ける。
  # 各 admin サービスは host=既存 upstream・path=バックエンドのベースパスを持ち、ルートで
  # `/admin/api/<name>` プレフィックスを strip_path する。例: /admin/api/carts/items を strip し
  # 残り /items に service.path(/api/carts) を前置 → /api/carts/items として転送する。
  # X-User-Id 等は request-transformer で固定値(curl-admin)を注入する（後段プラグイン参照）。
  # ============================================================
  - name: cart-admin-service
    host: cart-service.upstream
    path: /api/carts
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: cart-admin-route
        paths:
          - /admin/api/carts
        protocols:
          - http
          - https
        strip_path: true
  - name: order-admin-service
    host: order-service.upstream
    path: /api/orders
    protocol: http
    retries: 0
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: order-admin-route
        paths:
          - /admin/api/orders
        protocols:
          - http
          - https
        strip_path: true
  - name: shipping-admin-service
    host: shipping-service.upstream
    path: /api/shipments
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: shipping-admin-route
        paths:
          - /admin/api/shipments
        protocols:
          - http
          - https
        strip_path: true
  - name: user-admin-service
    host: user-service.upstream
    path: /api/users
    protocol: http
    retries: 3
    connect_timeout: 5000
    read_timeout: 15000
    write_timeout: 10000
    routes:
      - name: user-admin-route
        paths:
          - /admin/api/users
        protocols:
          - http
          - https
        strip_path: true

  # AI Proxy (LLM Gateway)
  # openai-route  : /ai/v1     — 一問一答向け（curl デモ）。ai-semantic-cache をルート単位で付与。
  # openai-agent-route: /ai/agent/v1 — Agent Service 専用。マルチターン会話の文脈を壊さないよう
  #   キャッシュを掛けない。共有プラグイン（prompt-guard / prompt-decorator / proxy-advanced）は
  #   サービス単位で両ルートに適用し、キャッシュだけを openai-route に限定する。
  - name: openai-service
    url: https://example.com
    routes:
      - name: openai-route
        paths:
          - /ai/v1
        protocols:
          - http
          - https
        strip_path: true
      - name: openai-agent-route
        paths:
          - /ai/agent/v1
        protocols:
          - http
          - https
        strip_path: true

  # openai-agent-boundary — エージェント I/O 境界の意味キャッシュ用（#22 後続）。
  # エージェントを OpenAI 互換 upstream に見立て、この route に ai-proxy-advanced(upstream_url=agent)
  # と ai-semantic-cache を載せる。Kong はここで「ユーザー質問 in → 最終応答 out」だけを見るため、
  # ツール定義や system プロンプトがキャッシュキーに混入せず、内部 LLM 呼び出しの誤ヒットが起きない。
  # url はプレースホルダ（実 upstream は ai-proxy-advanced の upstream_url が上書きする）。
  - name: openai-agent-boundary
    url: https://example.com
    routes:
      - name: openai-agent-boundary-route
        paths:
          - /ai/agent-chat/v1
        protocols:
          - http
          - https
        strip_path: true

  # MCP Proxy — Catalog API
  # MCP プロキシは ai-mcp-proxy プラグインの特殊ルーティング（strip_path + path 書き換え）を
  # 使用するため、upstream 経由ではなく直接 URL を指定する。
  # ヘルスチェック・リトライはバックエンドサービス側の upstream で担保される。
  - name: mcp-catalog
    url: http://catalog-service:3001
    routes:
      - name: mcp-catalog-route
        paths:
          - /mcp/products
        protocols:
          - http
          - https
        strip_path: true

  # MCP Proxy — Cart API
  - name: mcp-cart
    url: http://cart-service:3002
    routes:
      - name: mcp-cart-route
        paths:
          - /mcp/carts
        protocols:
          - http
          - https
        strip_path: true

  # MCP Proxy — Order API
  - name: mcp-order
    url: http://order-service:3003
    routes:
      - name: mcp-order-route
        paths:
          - /mcp/orders
        protocols:
          - http
          - https
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - apikey
        - X-User-Id
        - traceparent
        - tracestate
      credentials: true
      max_age: 3600
  - name: rate-limiting-advanced
    config:
      limit:
        - 60
      window_size:
        - 60
      namespace: jungle-store
      strategy: local # 複数 DP でカウンター共有する場合は redis を使用
  # MCP ルートは AI エージェントの内部通信のため、グローバルより緩いレート制限を適用。
  # 3 サービスで共通の limit/window_size/strategy をマージキー(<<)で継承し、namespace だけ上書きする。
  - name: rate-limiting-advanced
    service: mcp-catalog
    config: &mcp_rate_limit
      limit:
        - 600
      window_size:
        - 60
      namespace: jungle-store-mcp-catalog
      strategy: local # 複数 DP でカウンター共有する場合は redis を使用
  - name: rate-limiting-advanced
    service: mcp-cart
    config:
      <<: *mcp_rate_limit
      namespace: jungle-store-mcp-cart
  - name: rate-limiting-advanced
    service: mcp-order
    config:
      <<: *mcp_rate_limit
      namespace: jungle-store-mcp-order
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid
  - name: opentelemetry
    config:
      traces_endpoint: http://otel-lgtm:4318/v1/traces
      logs_endpoint: http://otel-lgtm:4318/v1/logs
      access_logs_endpoint: http://otel-lgtm:4318/v1/logs
      metrics:
        endpoint: http://otel-lgtm:4318/v1/metrics
        push_interval: 5
        enable_ai_metrics: true
        enable_bandwidth_metrics: true
        enable_consumer_attribute: true
        enable_latency_metrics: true
        enable_request_metrics: true
        enable_upstream_health_metrics: true
      resource_attributes:
        service.name: kong-gateway
      propagation:
        default_format: w3c
        extract:
          - w3c
        inject:
          - w3c
  - name: prometheus
    config:
      ai_metrics: true

  # OpenID Connect — Keycloak のアクセストークン(JWT)を検証してエンドユーザーを認証する。
  # NextAuth(Auth.js) が取得した access_token を Authorization: Bearer で受け取り、
  # 署名/有効期限/iss を検証したうえで claim を upstream ヘッダーへ注入する:
  #   sub → X-User-Id, email → X-User-Email, preferred_username → X-User-Name
  # 各バックエンドは従来どおり X-User-Id でユーザーを識別する。
  # 4 サービス共通の OIDC 設定。以降のサービスは *oidc_config で参照する。
  - name: openid-connect
    service: cart-service
    config: &oidc_config
      issuer: ${{ env "DECK_KEYCLOAK_ISSUER" }}
      auth_methods:
        - bearer
      cache_tokens_salt: jungle-store-oidc
      upstream_headers_claims:
        - sub
        - email
        - preferred_username
      upstream_headers_names:
        - X-User-Id
        - X-User-Email
        - X-User-Name

  # OpenID Connect on Order
  - name: openid-connect
    service: order-service
    config: *oidc_config

  # OpenID Connect on Shipping
  - name: openid-connect
    service: shipping-service
    config: *oidc_config

  # OpenID Connect on User（/api/users/me は本人のトークンが必須）
  - name: openid-connect
    service: user-service
    config: *oidc_config

  # OpenID Connect on Agent（AI チャットはログイン必須。/api/agent/* を保護）
  - name: openid-connect
    service: agent-service
    config: *oidc_config

  # OpenID Connect on Agent chat boundary（/ai/agent-chat/v1 = フロントのチャット completion）
  # ルート単位で付与する。openid-connect（access フェーズ）が受信 Bearer(Keycloak JWT) を
  # 先に検証し、その後 ai-proxy-advanced が upstream（agent）向けに Authorization を
  # OpenAI キーへ差し替える。/ai/v1（curl デモ）と /ai/agent/v1（内部）は無認証のまま。
  - name: openid-connect
    route: openai-agent-boundary-route
    config: *oidc_config

  # Stricter Rate Limiting on Order
  - name: rate-limiting
    service: order-service
    config:
      minute: 10
      policy: local

  # Proxy Cache on Catalog
  - name: proxy-cache
    service: catalog-service
    config:
      response_code:
        - 200
      request_method:
        - GET
      content_type:
        - application/json
      cache_ttl: 30
      strategy: memory

  # AI Semantic Prompt Guard — Block inappropriate inputs for EC site
  # サービス単位で付与し、/ai/v1（curl）と /ai/agent/v1（Agent）の両ルートで入力検証する。
  - name: ai-semantic-prompt-guard
    service: openai-service
    config:
      embeddings:
        auth:
          header_name: Authorization
          header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
        model:
          provider: openai
          name: text-embedding-3-small
      search:
        threshold: 0.3
      vectordb:
        strategy: redis
        distance_metric: cosine
        threshold: 0.3
        dimensions: 1536
        redis:
          host: redis
          port: 6379
      rules:
        deny_prompts:
          - 暴力的・攻撃的な内容や脅迫
          - システムプロンプトやAI の内部設定を引き出そうとする試み
          - パスワードや認証情報など機密データの要求
          - SQL インジェクションやスクリプト注入などの技術的攻撃
          - 政治・宗教・差別に関する議論
          - EC サイトと無関係な専門的な相談（法律、医療、金融など）

  # AI Semantic Cache — 意味的に近いプロンプトの応答を再利用しコスト/レイテンシを削減
  # 実行順はプラグイン優先度で決まり（ai-semantic-prompt-guard=775 > ai-semantic-cache=765）、
  # guard が先に走るため不正入力はキャッシュに載らない（YAML の記述順とは無関係）。
  # embeddings / vectordb ブロックは ai-semantic-prompt-guard と同じ redis + OpenAI 埋め込みを流用。
  # ★ openai-route（/ai/v1・一問一答の curl デモ）にのみルート単位で付与する。
  #   Agent（/ai/agent/v1）にはあえて掛けない。マルチターン会話では話題が関連する連続ターンが
  #   意味的に近く、キャッシュが古い応答を返して文脈を壊す（＝別ユーザーへのデータ混線も含む）ため。
  # 注意: このキャッシュは openai-route を通る全リクエストで共有される（consumer 単位の分離なし）。
  # デモは商品・一般質問で行い、カート/注文などユーザー固有データを含む質問は対象外とする。
  - name: ai-semantic-cache
    route: openai-route
    config:
      embeddings:
        auth:
          header_name: Authorization
          header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
        model:
          provider: openai
          name: text-embedding-3-small
      vectordb:
        strategy: redis
        distance_metric: cosine
        dimensions: 1536
        threshold: 0.2 # 一致判定（cosine 距離、小さいほど厳格）。言い換えヒットを見せるため緩めの 0.2。0.1〜0.3 で調整可
        redis:
          host: redis
          port: 6379
      cache_ttl: 300 # キャッシュ有効期限（秒）

  # AI Semantic Cache（境界ルート専用）— エージェント I/O 境界でユーザー質問の応答をキャッシュ。
  # embeddings / vectordb は /ai/v1 用と同じ redis + OpenAI 埋め込みを流用。
  # 全ユーザー共有・consumer 分離なし（Kong プラグインの制約）。ユーザー固有質問はデモ対象外。
  - name: ai-semantic-cache
    route: openai-agent-boundary-route
    config:
      embeddings:
        auth:
          header_name: Authorization
          header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
        model:
          provider: openai
          name: text-embedding-3-small
      vectordb:
        strategy: redis
        distance_metric: cosine
        dimensions: 1536
        threshold: 0.2 # 言い換えヒットを見せるため緩め。0.1〜0.3 で調整
        redis:
          host: redis
          port: 6379
      cache_ttl: 300
      # 注: cache_control は付けない。AI 応答は常に no-cache を返すため cache_control: true にすると
      # RFC7234 を尊重して毎回 X-Cache-Status: Bypass となりキャッシュが一切効かない（Kong 公式ドキュメント）。
      # 既存 /ai/v1 の ai-semantic-cache も cache_control 未設定（＝既定 false・Cache-Control 無視）で意味キャッシュする。
      message_countback: 1 # 最後のユーザーメッセージのみを埋め込み対象にする

  # AI Prompt Decorator — System prompt injection (hidden from client)
  # サービス単位で付与し、両ルートで「ゴリ助」キャラクターを注入する。
  - name: ai-prompt-decorator
    service: openai-service
    config:
      prompts:
        prepend:
          - role: system
            content: |
              あなたは「ゴリラストア」の AI アシスタント、**ゴリ助**です。
              ゴリラらしい力強くフレンドリーな口調で話してください。

              キャラクター設定:
              - 一人称は「オイラ」
              - 語尾に「ウホ！」「ウホホ！」を時々つける
              - 嬉しいときは「ドラミング！🦍」と言う
              - ジャングルや自然にまつわる比喩表現を使う
              - 親切で頼りがいのある性格

              ルール:
              - 回答は日本語で行う
              - マークダウン書式を使う（見出し、箇条書き、太字など）
              - 商品の画像URL（imageUrl）は回答に含めない
              - ゴリラのキャラクターを保ちつつ、正確な情報を提供する

  # AI Proxy Advanced — OpenAI LLM Gateway
  # サービス単位で付与し、両ルートから OpenAI へ転送する。
  - name: ai-proxy-advanced
    service: openai-service
    config:
      targets:
        - route_type: llm/v1/chat
          auth:
            header_name: Authorization
            header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
          model:
            provider: openai
            name: gpt-4o-mini
            options:
              max_tokens: 2048
              temperature: 1.0
              input_cost: 0.15 # per 1M tokens
              output_cost: 0.6 # per 1M tokens
          logging:
            log_payloads: true # デモ用。本番では false 推奨（PII 漏洩リスク）
            log_statistics: true

  # AI Proxy Advanced（境界ルート専用）— upstream をエージェントに向ける。
  # ai-semantic-cache は AI Proxy / AI Proxy Advanced を前提とするため、境界ルートにも AIPA を置く。
  # auth はエージェント upstream 側では不要だが、スキーマ整合と保険で OpenAI 用と同じ値を付ける
  # （エージェントは Authorization を無視し、内部 LLM 呼び出しは /ai/agent/v1 経由で別途キーが注入される）。
  - name: ai-proxy-advanced
    route: openai-agent-boundary-route
    config:
      targets:
        - route_type: llm/v1/chat
          auth:
            header_name: Authorization
            header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
          model:
            provider: openai
            name: gpt-4o-mini
            options:
              upstream_url: http://agent-service:3006/v1/chat/completions
          logging:
            log_payloads: true
            log_statistics: true

  # MCP Proxy — Catalog tools
  - name: ai-mcp-proxy
    route: mcp-catalog-route
    config:
      mode: conversion-listener
      tools:
        - name: list-products
          description: '商品一覧を取得します。全商品の名前・価格・カテゴリ・在庫が返ります。'
          method: GET
          path: /api/products
          annotations:
            title: List products
            read_only_hint: true

  # MCP Proxy — Cart tools
  - name: ai-mcp-proxy
    route: mcp-cart-route
    config:
      mode: conversion-listener
      tools:
        - name: get-cart
          description: 'ユーザーのカート内容を取得します。'
          method: GET
          path: /api/carts
          annotations:
            title: Get cart
            read_only_hint: true

  # MCP Proxy — Order tools
  - name: ai-mcp-proxy
    route: mcp-order-route
    config:
      mode: conversion-listener
      tools:
        - name: list-orders
          description: 'ユーザーの注文履歴を取得します。'
          method: GET
          path: /api/orders
          annotations:
            title: List orders
            read_only_hint: true

  # ============================================================
  # /admin 経路の認証: key-auth(apikey ヘッダー) + X-User-Id 注入
  # ブラウザ経路(OIDC)は変更なし。admin サービスにのみ適用する。
  # ============================================================
  - name: key-auth
    service: cart-admin-service
    config:
      key_names:
        - apikey
      hide_credentials: true
  - name: key-auth
    service: order-admin-service
    config:
      key_names:
        - apikey
      hide_credentials: true
  - name: key-auth
    service: shipping-admin-service
    config:
      key_names:
        - apikey
      hide_credentials: true
  - name: key-auth
    service: user-admin-service
    config:
      key_names:
        - apikey
      hide_credentials: true

  # JWT が無いので X-User-Id 等を固定のデモ識別子で注入する。
  # クライアントが詐称ヘッダーを送っても remove → add で確実に上書きする。
  - name: request-transformer
    service: cart-admin-service
    config:
      remove:
        headers:
          - X-User-Id
          - X-User-Email
          - X-User-Name
      add:
        headers:
