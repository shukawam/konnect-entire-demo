_defaults:
  kongctl:
    namespace: jungle-store

portal_teams:
  - ref: catalog-dev-team
    portal: jungle-store-dev-portal
    name: Catalog API Developer Team
    description: 'Developers with API read access'
    roles:
      - ref: catalog-dev-team-api-viewer
        role_name: API Viewer
        entity_id: !ref catalog-api#id
        entity_type_name: apis
        entity_region: us
