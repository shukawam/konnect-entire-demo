openapi: 3.1.0
info:
  title: Order Service API
  description: 注文サービス API
  version: 1.0.0
servers:
  - url: http://localhost:3003
    description: Local development server
tags:
  - name: Order
    description: 注文関連のエンドポイント
paths:
  /api/orders:
    get:
      operationId: listOrders
      summary: 注文一覧取得
      tags:
        - Order
      parameters:
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
          example: user-1
      responses:
        "200":
          description: 注文一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createOrder
      summary: 注文作成
      description: カートの内容から注文を作成し、Kafkaにイベントを発行後、カートをクリアする
      tags:
        - Order
      parameters:
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
          example: user-1
      responses:
        "201":
          description: 注文作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Bad Request (cart is empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Bad Gateway (failed to fetch cart)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/orders/{id}:
    get:
      operationId: getOrder
      summary: 注文詳細取得
      tags:
        - Order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: order-1
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
          example: user-1
      responses:
        "200":
          description: 注文詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    OrderItem:
      type: object
      properties:
        id:
          type: string
          example: item-1
        orderId:
          type: string
          example: order-1
        productId:
          type: string
          example: prod-1
        quantity:
          type: integer
          example: 2
        price:
          type: number
          example: 1500
    Order:
      type: object
      properties:
        id:
          type: string
          example: order-1
        userId:
          type: string
          example: user-1
        status:
          type: string
          example: PENDING
        totalPrice:
          type: number
          example: 3000
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          example: "2026-01-01T00:00:00.000Z"
        updatedAt:
          type: string
          example: "2026-01-01T00:00:00.000Z"
    Error:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized
