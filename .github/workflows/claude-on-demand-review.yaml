name: Claude On-Demand Review (non-blocking)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: read
  statuses: read

concurrency:
  group: claude-on-demand-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  claude:
    if: >
      contains(github.event.comment.body, '@claude') &&
      github.event.sender.type != 'Bot' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (
        github.event_name == 'pull_request_review_comment' ||
        github.event.issue.pull_request != null
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code (on-demand)
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Read,Glob,Grep,Edit,Write"
            --append-system-prompt "日本語で回答すること。レビュー時は正確性・セキュリティ・信頼性・テスト影響を重視し、指摘は重要度(High/Med/Low)で分類すること。各問題の理由と具体的な修正案を提示すること。不確実な場合はその旨を明記すること。特定のコード行に関する指摘は mcp__github_inline_comment__create_inline_comment（confirmed: true 付き）でインラインコメントとして投稿すること。全体的なフィードバックは gh pr comment で投稿すること。GitHub コメントとしてのみ投稿し、メッセージとしてレビューテキストを出力しないこと。"

      - name: Note non-blocking Claude failure
        if: steps.claude.outcome == 'failure'
        run: |
          echo "Claude on-demand failed (non-blocking)."
          echo "Use 'Re-run jobs' or auto-review workflow as fallback."
