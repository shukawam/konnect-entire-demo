_defaults:
  kongctl:
    namespace: jungle-store

apis:
  - ref: catalog-api
    name: !file portals/apis/catalog/openapi.yaml#info.title
    description: !file portals/apis/catalog/openapi.yaml#info.description
    version: "1.0.0"
    labels:
      app: jungle-store
    attributes:
      app:
        - jungle-store
      tier:
        - free
    versions:
      - ref: catalog-api-v1
        version: !file portals/apis/catalog/openapi.yaml#info.version
        spec: !file portals/apis/catalog/openapi.yaml
    documents:
      - ref: catalog-api-getting-started
        title: Getting Started
        slug: catalog-api-getting-started
        status: published
        content: !file portals/docs/catalog_ja.md
    publications:
      - ref: catalog-api-v1-publication
        portal_id: !ref jungle-store-dev-portal#id
        visibility: private

