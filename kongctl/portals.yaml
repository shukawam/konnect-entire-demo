_defaults:
  kongctl:
    namespace: jungle-store

portals:
  - ref: jungle-store-dev-portal
    name: jungle-store-dev-portal
    display_name: Jungle Store Dev Portal
    description: Dev Portal for Jungle Store demo.
    authentication_enabled: true
    rbac_enabled: false
    default_api_visibility: private
    default_page_visibility: private
    auto_approve_developers: false
    auto_approve_applications: false

    assets:
      logo: !file ./assets/logo.jpg
      favicon: !file ./assets/favicon.png

    customization:
      ref: jungle-store-dev-portal-customization
      theme:
        mode: dark
        colors:
          primary: '#CCFF00'
      css: !file portals/theme.css

    pages:
      - ref: home
        slug: /
        title: Home
        description: Home page for Jungle Store Dev Portal
        visibility: public
        content: !file portals/pages/home.md
      - ref: apis
        slug: 'apis'
        title: 'APIs'
        description: 'API Products available in this Developer Portal.'
        visibility: 'private'
        status: 'published'
        content: !file portals/pages/apis.md
      - ref: guides
        slug: 'guides'
        title: 'Guides'
        description: 'Guide for Developer Portal'
        visibility: 'private'
        status: 'published'
        content: !file portals/pages/guides/guides.md
        children:
          - ref: guides-getting-started
            slug: 'getting-started'
            title: 'Getting Started Guide'
            description: 'APIの利用開始から実際の統合まで'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/guides/getting-started.md
          - ref: guides-lifecycle
            slug: 'lifecycle'
            title: 'API Lifecycle'
            description: 'APIライフサイクル管理とバージョニングポリシー'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/guides/lifecycle.md
          - ref: guides-usage
            slug: 'usage'
            title: 'API Usage Guide'
            description: 'API利用ガイド - ベストプラクティスとパターン'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/guides/usage.md
          - ref: guides-regulation
            slug: 'regulation'
            title: 'Regulations & Policies'
            description: '利用規約、ポリシー、コンプライアンス'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/guides/regulation.md
      - ref: demos
        slug: 'demos'
        title: 'デモ実施者ガイド'
        description: 'Kong Konnect デモシナリオ集'
        visibility: 'public'
        status: 'published'
        content: !file portals/pages/demos/demos.md
        children:
          - ref: demos-gateway-basics
            slug: 'gateway-basics'
            title: 'API Gateway の基本機能'
            description: 'プロキシキャッシュ、API キー認証、レート制限、Correlation ID、CORS を curl で体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/gateway-basics.md
          - ref: demos-e2e-purchase
            slug: 'e2e-purchase'
            title: 'EC サイト購買フロー'
            description: '商品閲覧からカート追加、注文確定、配送ステータス自動更新までのエンドツーエンド体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/e2e-purchase.md
          - ref: demos-observability
            slug: 'observability'
            title: '分散トレーシング & オブザーバビリティ'
            description: 'Tempo・Loki・Prometheus・Grafana による統合監視を体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/observability.md
          - ref: demos-ai-gateway
            slug: 'ai-gateway'
            title: 'AI Gateway & MCP'
            description: 'AI Proxy、Prompt Guard、Semantic Cache、Prompt Decorator、MCP を体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/ai-gateway.md
          - ref: demos-event-driven
            slug: 'event-driven'
            title: 'イベント駆動アーキテクチャ'
            description: 'Kafka と Kong Event Gateway による非同期処理フローと ACL 制御を体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/event-driven.md
          - ref: demos-security
            slug: 'security'
            title: 'セキュリティ多層防御'
            description: '認証、レート制限、CORS、AI プロンプトガード、Correlation ID を体験'
            visibility: 'public'
            status: 'published'
            content: !file portals/pages/demos/security.md

    snippets:
      - ref: page-nav
        name: page-nav
        title: Page Nav
        description: Page navigation for sidebar
        visibility: public
        status: published
        content: !file portals/snippets/page-nav.md
      - ref: sidebar
        name: sidebar
        title: Jungle Store Sidebar
        description: Jungle Store Sidebar
        visibility: public
        status: published
        content: !file portals/snippets/sidebar.md
      - ref: footer-support
        name: footer-support
        title: Footer Support
        description: Support contact information for footer
        visibility: public
        status: published
        content: !file portals/snippets/footer-support.md
