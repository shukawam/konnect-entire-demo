openapi: 3.1.0
info:
  title: Agent Service API
  description: AI搭載ショッピングアシスタント API
  version: 0.1.0
servers:
  - url: http://localhost:3006
    description: Local development server
tags:
  - name: Agent
    description: AIエージェント関連のエンドポイント
paths:
  /api/agent/suggestions:
    get:
      operationId: getSuggestions
      summary: チャット候補取得
      description: チャットの入力候補を取得します。
      tags:
        - Agent
      responses:
        '200':
          description: 候補一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionsResponse'
components:
  schemas:
    SuggestionsResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: string
          example:
            - どんな商品がありますか？
            - おすすめの商品を教えてください
            - 注文履歴を確認したい
