x-default: &default
  networks:
    - konnect-entire-demo-network

x-otel-env: &otel-env
  OTEL_TRACES_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
  OTEL_NODE_RESOURCE_DETECTORS: env,host,os
  NODE_OPTIONS: --require @opentelemetry/auto-instrumentations-node/register

networks:
  konnect-entire-demo-network:
    driver: bridge

volumes:
  mysql_data:

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  mysql:
    <<: *default
    container_name: mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    <<: *default
    container_name: kafka
    image: apache/kafka:3.7.0
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    <<: *default
    container_name: kafka-init
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic order.created
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic order.status-updated
        echo "Kafka topics created."

  kafka-ui:
    <<: *default
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  redis:
    <<: *default
    container_name: redis
    image: redis:8.0.2
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    <<: *default
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.4
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'true'
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: '8081'
    ports:
      - '8081:8081'
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import

  keycloak-init:
    <<: *default
    container_name: keycloak-init
    image: quay.io/keycloak/keycloak:26.4
    depends_on:
      keycloak:
        condition: service_started
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        KC=http://keycloak:8081
        echo "waiting for keycloak admin ..."
        until /opt/keycloak/bin/kcadm.sh config credentials --server $$KC --realm master \
          --user "$${KEYCLOAK_ADMIN}" --password "$${KEYCLOAK_ADMIN_PASSWORD}" >/dev/null 2>&1; do
          sleep 3
        done
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
        echo "master realm sslRequired=NONE applied."
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

  kong:
    <<: *default
    container_name: kong
    image: kong/kong-gateway:3.14.0.1
    environment:
      KONG_ROLE: data_plane
      KONG_DATABASE: off
      KONG_VITALS: off
      KONG_CLUSTER_MTLS: pki
      KONG_CLUSTER_CONTROL_PLANE: ${PREFIX:-}.us.cp.konghq.com:443
      KONG_CLUSTER_SERVER_NAME: ${PREFIX:-}.us.cp.konghq.com
      KONG_CLUSTER_TELEMETRY_ENDPOINT: ${PREFIX:-}.us.tp.konghq.com:443
      KONG_CLUSTER_TELEMETRY_SERVER_NAME: ${PREFIX:-}.us.tp.konghq.com
      KONG_CLUSTER_CERT: /etc/kong/cluster-certs/cluster.crt
      KONG_CLUSTER_CERT_KEY: /etc/kong/cluster-certs/cluster.key
      KONG_LUA_SSL_TRUSTED_CERTIFICATE: system
      KONG_KONNECT_MODE: on
      KONG_CLUSTER_DP_LABELS: type:docker-macOsArmOS
      KONG_ROUTER_FLAVOR: expressions
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: 1.0
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    ports:
      - '8000:8000' # Proxy
      - '8100:8100' # Status API
    volumes:
      - ./certs/kong-gateway:/etc/kong/cluster-certs
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      catalog-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      keycloak:
        condition: service_started

  event-gateway:
    <<: *default
    container_name: event-gateway
    image: kong/kong-event-gateway:1.2.0
    environment:
      # see: https://developer.konghq.com/event-gateway/configuration/
      KONG_KONNECT_REGION: us
      KONG_KONNECT_DOMAIN: konghq.com
      KONG_KONNECT_GATEWAY_CLUSTER_ID: ${EVENT_GATEWAY_CP_ID:-}
      KONG_KONNECT_CLIENT_CERT_PATH: /etc/kong/cluster-certs/cluster.crt
      KONG_KONNECT_CLIENT_KEY_PATH: /etc/kong/cluster-certs/cluster.key
      KEG__OBSERVABILITY__LOG_FLAGS: info
      KEG__OBSERVABILITY__LOG_FORMAT: json
      KEG__OBSERVABILITY__METRICS_ROLLUP_ALLOW_MAP: 'api_kind=produce,fetch'
      KEG__OBSERVABILITY__OTEL__TRACES__ENDPOINT: http://otel-lgtm:4318/v1/traces
      OTEL_SERVICE_NAME: event-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - '19091:19091'
      - '19092:19092'
      - '19093:19093'
      - '19094:19094'
    volumes:
      - ./certs/event-gateway:/etc/kong/cluster-certs
    healthcheck:
      # distroless イメージ（シェル/curl 無し）のため keg バイナリ内蔵の healthcheck を使う。
      # Konnect から設定を取得し Kafka リスナーが受付可能になると OK を返す。
      test: ['CMD', '/keg', 'healthcheck']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy

  deck:
    <<: *default
    image: kong/deck:v1.49.0
    container_name: deck
    working_dir: /files
    volumes:
      - ./config/kong/kong.yaml:/files/kong.yaml
    environment:
      DECK_KONNECT_CONTROL_PLANE_NAME: ${DECK_KONNECT_CONTROL_PLANE_NAME:-}
      DECK_KONNECT_TOKEN: ${DECK_KONNECT_TOKEN:-}
      DECK_OPENAI_API_KEY: ${DECK_OPENAI_API_KEY:-}
      DECK_KEYCLOAK_ISSUER: ${DECK_KEYCLOAK_ISSUER:-http://keycloak:8081/realms/jungle-store/.well-known/openid-configuration}
    command: ['gateway', 'sync', 'kong.yaml']
    depends_on:
      - kong

  # ============================================================
  # Observability
  # ============================================================
  otel-lgtm:
    <<: *default
    container_name: otel-lgtm
    image: grafana/otel-lgtm:0.25.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: true
    volumes:
      - ./config/observability/otel-lgtm/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml
    ports:
      - '3010:3000' # Grafana UI
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Application Services
  # ============================================================
  catalog-service:
    <<: *default
    container_name: catalog-service
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    command:
      [
        'sh',
        '-c',
        'npx prisma db push --skip-generate && npx tsx prisma/seed.ts && npx tsx watch src/index.ts',
      ]
    ports:
      - '3001:3001'
    environment:
      <<: *otel-env
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/catalog_db
      PORT: 3001
      OTEL_SERVICE_NAME: catalog-service
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3001/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/catalog-service/src
          target: /app/services/catalog-service/src
        - action: rebuild
          path: ./services/catalog-service/package.json
        - action: rebuild
          path: ./services/catalog-service/prisma/schema.prisma

  cart-service:
    <<: *default
    container_name: cart-service
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    command: ['sh', '-c', 'npx prisma db push --skip-generate && npx tsx watch src/index.ts']
    ports:
      - '3002:3002'
    environment:
      <<: *otel-env
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/cart_db
      PORT: 3002
      OTEL_SERVICE_NAME: cart-service
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3002/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/cart-service/src
          target: /app/services/cart-service/src
        - action: rebuild
          path: ./services/cart-service/package.json
        - action: rebuild
          path: ./services/cart-service/prisma/schema.prisma

  order-service:
    <<: *default
    container_name: order-service
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    command: ['sh', '-c', 'npx prisma db push --skip-generate && npx tsx watch src/index.ts']
    ports:
      - '3003:3003'
    environment:
      <<: *otel-env
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/order_db
      KAFKA_BROKER: event-gateway:19091
      CART_SERVICE_URL: http://cart-service:3002
      CATALOG_SERVICE_URL: http://catalog-service:3001
      PORT: 3003
      OTEL_SERVICE_NAME: order-service
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3003/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      event-gateway:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/order-service/src
          target: /app/services/order-service/src
        - action: rebuild
          path: ./services/order-service/package.json
        - action: rebuild
          path: ./services/order-service/prisma/schema.prisma

  shipping-service:
    <<: *default
    container_name: shipping-service
    build:
      context: .
      dockerfile: services/shipping-service/Dockerfile
    command: ['sh', '-c', 'npx prisma db push --skip-generate && npx tsx watch src/index.ts']
    ports:
      - '3004:3004'
    environment:
      <<: *otel-env
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/shipping_db
      KAFKA_BROKER: event-gateway:19093
      PORT: 3004
      OTEL_SERVICE_NAME: shipping-service
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3004/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      event-gateway:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/shipping-service/src
          target: /app/services/shipping-service/src
        - action: rebuild
          path: ./services/shipping-service/package.json
        - action: rebuild
          path: ./services/shipping-service/prisma/schema.prisma

  user-service:
    <<: *default
    container_name: user-service
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    command:
      [
        'sh',
        '-c',
        'npx prisma db push --skip-generate && npx tsx prisma/seed.ts && npx tsx watch src/index.ts',
      ]
    ports:
      - '3005:3005'
    environment:
      <<: *otel-env
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@mysql:3306/user_db
      PORT: 3005
      OTEL_SERVICE_NAME: user-service
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3005/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/user-service/src
          target: /app/services/user-service/src
        - action: rebuild
          path: ./services/user-service/package.json
        - action: rebuild
          path: ./services/user-service/prisma/schema.prisma

  agent-service:
    <<: *default
    container_name: agent-service
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    command: ['npx', 'tsx', 'watch', 'src/index.ts']
    ports:
      - '3006:3006'
    environment:
      PORT: 3006
      OTEL_SERVICE_NAME: agent-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      GATEWAY_ENDPOINT: http://kong:8000
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3006/health'').then(r=>{if(!r.ok)throw r})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kong:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./services/agent-service/src
          target: /app/services/agent-service/src
        - action: rebuild
          path: ./services/agent-service/package.json

  frontend:
    <<: *default
    container_name: frontend
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3010}
    command: ['npx', 'next', 'dev', '--port', '3000']
    ports:
      - '3000:3000'
    environment:
      BACKEND_URL: http://kong:8000
      NEXT_PUBLIC_GRAFANA_URL: ${NEXT_PUBLIC_GRAFANA_URL:-http://localhost:3010}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_SERVICE_NAME: frontend
      NEXT_OTEL_VERBOSE: 1
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: 'true'
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-jungle-store}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8081}
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000'').then(r=>{if(!r.ok)throw r})"']
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kong:
        condition: service_healthy
      keycloak:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./services/frontend/src
          target: /app/services/frontend/src
        - action: sync
          path: ./services/frontend/public
          target: /app/services/frontend/public
        - action: rebuild
          path: ./services/frontend/package.json
